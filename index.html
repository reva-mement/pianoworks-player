<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PianoWorks Share Player</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #1b120a;
    color: #f0e6d2;
    font-family: 'Times New Roman', 'Hiragino Mincho ProN', serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #bgCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
    pointer-events: none;
  }
  .card {
    position: relative;
    z-index: 1;
    width: min(520px, 90vw);
    background: linear-gradient(160deg, rgba(42,28,16,0.75), rgba(27,18,10,0.75));
    backdrop-filter: blur(2px);
    border: 1px solid #b87333;
    border-radius: 10px;
    padding: 32px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  h1 {
    font-size: 14px;
    letter-spacing: 4px;
    color: #b87333;
    margin: 0 0 8px;
    font-weight: normal;
  }
  .title {
    font-size: 22px;
    margin: 0 0 28px;
    word-break: break-word;
  }
  button#playBtn {
    width: 84px; height: 84px;
    border-radius: 50%;
    border: 2px solid #d4af37;
    background: radial-gradient(circle, #3a2612, #1b120a);
    color: #d4af37;
    font-size: 28px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  button#playBtn:hover { box-shadow: 0 0 20px rgba(212,175,55,0.5); }
  button#playBtn:active { transform: scale(0.95); }
  .status {
    margin-top: 20px;
    font-size: 13px;
    color: #cfc4ad;
    min-height: 18px;
  }
  .bar-wrap {
    margin-top: 16px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, gold, #fff8dc);
  }
  .error {
    color: #e0a0a0;
    font-size: 13px;
    line-height: 1.6;
  }
  .footer {
    margin-top: 28px;
    font-size: 11px;
    color: #6b5c48;
    letter-spacing: 1px;
  }
  .promo {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid rgba(184,115,51,0.3);
    font-size: 12px;
    line-height: 1.7;
    color: #cfc4ad;
  }
  .promo a {
    color: #d4af37;
    word-break: break-all;
  }
  .promo a:hover {
    color: #fff8dc;
  }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
  <div class="card" id="card">
    <h1>PIANOWORKS SHARE</h1>
    <div class="title" id="titleText">読み込み中…</div>
    <div id="playArea"></div>
    <div class="bar-wrap"><div class="bar" id="bar"></div></div>
    <div class="status" id="status"></div>
    <div class="promo">無料版PianoWorksはこちらからお試しいただけます<br>(<a href="https://reva-mement.github.io/app-piano/" target="_blank" rel="noopener">https://reva-mement.github.io/app-piano/</a>)</div>
    <div class="footer">Played with PianoWorks</div>
  </div>

<script>
(function () {
  const params = new URLSearchParams(location.search);
  const d = params.get('d');
  const t = params.get('t');
  const z = params.get('z'); // '1' = gzip圧縮あり

  const titleEl = document.getElementById('titleText');
  const playArea = document.getElementById('playArea');
  const statusEl = document.getElementById('status');
  const barEl = document.getElementById('bar');

  titleEl.textContent = t ? decodeURIComponent(t) : 'Untitled Session';

  if (!d) {
    playArea.innerHTML = '<div class="error">再生データが見つかりません。<br>URLが正しいか確認してください。</div>';
    return;
  }

  function base64UrlDecode(str) {
    str = str.replace(/-/g, '+').replace(/_/g, '/');
    while (str.length % 4) str += '=';
    const binary = atob(str);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes;
  }

  // ★ convertEventsToMidi() (アプリ本体 session.js) が生成する
  //   固定フォーマット（TPQN=128, 120bpm, フォーマット0, 1トラック）専用の簡易パーサー
  function parseSimpleMidi(bytes) {
    const TPQN = 128;
    const bpm = 120;
    const msPerTick = (60000 / bpm) / TPQN;
    let pos = 14; // MThdチャンク(8) + データ(6) = 14byte
    pos += 8;     // MTrkチャンクの 'MTrk'(4) + length(4)
    let tick = 0;
    const events = [];

    function readVLQ() {
      let value = 0;
      while (true) {
        const b = bytes[pos++];
        value = (value << 7) | (b & 0x7f);
        if (!(b & 0x80)) break;
      }
      return value;
    }

    while (pos < bytes.length) {
      const delta = readVLQ();
      tick += delta;
      const status = bytes[pos++];
      if (status === 0xFF) {
        const metaType = bytes[pos++];
        const len = readVLQ();
        pos += len;
        if (metaType === 0x2F) break; // End of Track
        continue;
      }
      const note = bytes[pos++];
      const vel = bytes[pos++];
      events.push({
        note,
        velocity: vel / 127,
        time: (tick * msPerTick) / 1000,
        type: (status & 0xF0) === 0x80 ? 'off' : 'on'
      });
    }
    return events;
  }

  async function decodeToEvents() {
    let bytes = base64UrlDecode(d);
    if (z === '1') {
      if (!window.DecompressionStream) {
        throw new Error('このブラウザは展開(DecompressionStream)に対応していません');
      }
      const ds = new DecompressionStream('gzip');
      const stream = new Blob([bytes]).stream().pipeThrough(ds);
      bytes = new Uint8Array(await new Response(stream).arrayBuffer());
    }
    return parseSimpleMidi(bytes);
  }

  // ★ 本編(core.js)と同じ音名変換ルール（MIDIノート番号 → "C4"のような音名）
  const NOTE_NAMES = ['C', 'Cs', 'D', 'Ds', 'E', 'F', 'Fs', 'G', 'Gs', 'A', 'As', 'B'];
  function midiToNoteName(m) {
    return `${NOTE_NAMES[m % 12]}${Math.floor(m / 12) - 1}`;
  }

  // ★ 演奏に登場する音だけを本編と同じ場所（assets/sounds/*.mp3）から読み込む
  const audioBufferCache = {};
  async function preloadNeededSounds(ctx, events) {
    const uniqueNotes = [...new Set(events.map(ev => ev.note))];
    statusEl.textContent = `ピアノ音源を読み込み中…(0/${uniqueNotes.length})`;
    let loaded = 0;
    await Promise.allSettled(uniqueNotes.map(async (midiNote) => {
      const name = midiToNoteName(midiNote);
      try {
        const res = await fetch(`assets/sounds/${name}.mp3`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const buf = await res.arrayBuffer();
        audioBufferCache[midiNote] = await ctx.decodeAudioData(buf);
      } catch (e) {
        console.warn(`音源読み込み失敗: ${name}.mp3`, e);
      } finally {
        loaded++;
        statusEl.textContent = `ピアノ音源を読み込み中…(${loaded}/${uniqueNotes.length})`;
      }
    }));
  }

  function playEvents(ctx, events) {
    const startTime = ctx.currentTime + 0.2;
    const active = {};
    const master = ctx.createGain();
    master.gain.value = 0.9;
    master.connect(ctx.destination);

    let maxTime = 0;
    events.forEach(ev => {
      const when = startTime + ev.time;
      maxTime = Math.max(maxTime, ev.time);
      const buffer = audioBufferCache[ev.note];

      if (ev.type === 'on') {
        if (!buffer) return; // 読み込みに失敗した音はスキップ
        const src = ctx.createBufferSource();
        const gain = ctx.createGain();
        src.buffer = buffer;
        gain.gain.value = Math.min(1, Math.max(0.05, ev.velocity));
        src.connect(gain).connect(master);
        src.start(when);
        active[ev.note] = { src, gain };
      } else {
        const a = active[ev.note];
        if (a) {
          // ★ 本編と同様、サンプルの自然な減衰を活かすためフェードのみ行いブツ切りにしない
          a.gain.gain.setTargetAtTime(0, when, 0.15);
          a.src.stop(when + 0.6);
          delete active[ev.note];
        }
      }
    });

    // 再生中の進捗バー更新
    const totalMs = (maxTime + 1) * 1000;
    const t0 = performance.now();
    function tick() {
      const elapsed = performance.now() - t0;
      const pct = Math.min(100, (elapsed / totalMs) * 100);
      barEl.style.width = pct + '%';
      if (pct < 100) {
        requestAnimationFrame(tick);
      } else {
        statusEl.textContent = '再生終了';
        btn.textContent = '▶';
      }
    }
    requestAnimationFrame(tick);
    return startTime;
  }

  // ★ Sessionモードの背景エフェクト（session-effect.js V5.0）をそのまま移植
  //   音楽/海/光/宇宙/街 各10種 = 50モードからランダムに選ばれる。
  //   ノートが鳴るたびにテクスチャへ「にじみ」を書き込み、フィードバックで蓄積・拡散させる仕組み。
  const BASE_SHADERS = {
    accumulate: `precision mediump float;
        uniform sampler2D t; uniform vec3 u_colorTint;
        void main() {
            vec2 uv = gl_FragCoord.xy / 512.0;
            float px = 1.0 / 512.0;
            vec4 data = texture2D(t, uv);
            vec4 blurred = (texture2D(t, uv + vec2(0.0, px)) + texture2D(t, uv - vec2(0.0, px)) +
                            texture2D(t, uv - vec2(px, 0.0)) + texture2D(t, uv + vec2(px, 0.0))) * 0.25;
            vec4 result = max(data, blurred * 0.998);
            result.rgb *= u_colorTint;
            gl_FragColor = result;
        }`,
    flowing: `precision mediump float;
        uniform sampler2D t; uniform vec3 u_colorTint;
        void main() {
            vec2 uv = gl_FragCoord.xy / 512.0;
            vec4 data = texture2D(t, uv);
            vec2 velocity = (data.rg - 0.5) * 0.002;
            vec4 nextColor = texture2D(t, uv - velocity);
            nextColor.rgb *= u_colorTint;
            gl_FragColor = nextColor * 0.99;
        }`,
    snowfall: `precision mediump float;
        uniform sampler2D t; uniform vec3 u_colorTint; uniform float u_snowLevel;
        void main() {
            vec2 uv = gl_FragCoord.xy / 512.0;
            vec4 data = texture2D(t, uv);
            vec2 velocity = (data.rg - 0.5) * 0.002;
            vec4 nextColor = texture2D(t, uv - velocity);
            if (uv.y < u_snowLevel) { gl_FragColor = data; }
            else { nextColor.rgb *= u_colorTint; gl_FragColor = nextColor * 0.99; }
        }`,
    ripple: `precision mediump float;
        uniform sampler2D t; uniform vec3 u_colorTint;
        void main() {
            vec2 uv = gl_FragCoord.xy / 512.0;
            vec4 data = texture2D(t, uv);
            vec2 vel = (data.rg - 0.5) * 0.003;
            vec2 rotated = vec2(-vel.y, vel.x);
            vec4 nextColor = texture2D(t, uv - rotated);
            nextColor.rgb *= u_colorTint;
            gl_FragColor = nextColor * 0.985;
        }`,
    sparkle: `precision mediump float;
        uniform sampler2D t; uniform vec3 u_colorTint;
        void main() {
            vec2 uv = gl_FragCoord.xy / 512.0;
            vec4 data = texture2D(t, uv);
            data.rgb *= u_colorTint;
            gl_FragColor = data * 0.90;
        }`
  };

  function generateSplat(shape, palette, velocity) {
    const size = 16;
    const data = new Uint8Array(size * size * 4);
    const center = size / 2;
    const color = palette[Math.floor(Math.random() * palette.length)];
    const energy = velocity || 0.7;

    if (shape === 'glow') {
      for (let py = 0; py < size; py++) for (let px = 0; px < size; px++) {
        const dx = px - center, dy = py - center;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < center) {
          const idx = (py * size + px) * 4;
          const strength = 1.0 - (dist / center);
          data[idx] = color[0]; data[idx + 1] = color[1]; data[idx + 2] = color[2];
          data[idx + 3] = Math.floor(strength * 255);
        }
      }
    } else if (shape === 'spark') {
      const r = center * 0.55;
      for (let py = 0; py < size; py++) for (let px = 0; px < size; px++) {
        const dx = px - center, dy = py - center;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < r) {
          const idx = (py * size + px) * 4;
          const strength = Math.pow(1.0 - (dist / r), 2);
          data[idx] = color[0]; data[idx + 1] = color[1]; data[idx + 2] = color[2];
          data[idx + 3] = Math.floor(strength * 255);
        }
      }
    } else if (shape === 'ring') {
      const inner = center * 0.35, outer = center * 0.9;
      for (let py = 0; py < size; py++) for (let px = 0; px < size; px++) {
        const dx = px - center, dy = py - center;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > inner && dist < outer) {
          const idx = (py * size + px) * 4;
          const mid = (inner + outer) / 2, half = (outer - inner) / 2;
          const strength = 1.0 - Math.abs(dist - mid) / half;
          data[idx] = color[0]; data[idx + 1] = color[1]; data[idx + 2] = color[2];
          data[idx + 3] = Math.floor(strength * 255);
        }
      }
    } else if (shape === 'streak') {
      const angle = Math.random() * Math.PI;
      const cos = Math.cos(angle), sin = Math.sin(angle);
      const stretch = 1.5 + energy * 2.0;
      for (let py = 0; py < size; py++) for (let px = 0; px < size; px++) {
        const dx = px - center, dy = py - center;
        const rx = (dx * cos + dy * sin) / stretch;
        const ry = (-dx * sin + dy * cos) * 1.3;
        const dist = Math.sqrt(rx * rx + ry * ry);
        if (dist < center) {
          const idx = (py * size + px) * 4;
          const strength = 1.0 - (dist / center);
          data[idx] = color[0]; data[idx + 1] = color[1]; data[idx + 2] = color[2];
          data[idx + 3] = Math.floor(strength * 255);
        }
      }
    } else if (shape === 'scatter') {
      for (let py = 0; py < size; py++) for (let px = 0; px < size; px++) {
        if (Math.random() < 0.3 + energy * 0.2) {
          const idx = (py * size + px) * 4;
          const c = palette[Math.floor(Math.random() * palette.length)];
          data[idx] = c[0]; data[idx + 1] = c[1]; data[idx + 2] = c[2];
          data[idx + 3] = Math.floor(Math.random() * 200 + 55);
        }
      }
    }

    return {
      x: Math.floor(Math.random() * (512 - size)),
      y: Math.floor(Math.random() * (512 - size)),
      size, data
    };
  }

  const MODE_DEFINITIONS = [
    // ===== 音楽 (music) =====
    { id: 'piano_bloom',    theme: 'music', shaderType: 'accumulate', shape: 'glow',    palette: [[255,215,0],[255,255,255],[200,160,60]] },

    { id: 'bass_thump',     theme: 'music', shaderType: 'accumulate', shape: 'glow',    palette: [[150,20,20],[80,10,10],[220,60,60]] },
    { id: 'treble_sparkle', theme: 'music', shaderType: 'sparkle',    shape: 'spark',   palette: [[255,255,255],[255,240,180],[255,215,0]] },
    { id: 'chord_burst',    theme: 'music', shaderType: 'accumulate', shape: 'streak',  palette: [[255,215,0],[255,255,255],[220,180,255]] },
    { id: 'metronome_pulse',theme: 'music', shaderType: 'ripple',     shape: 'ring',    palette: [[20,20,20],[255,255,255],[180,180,180]] },
    { id: 'staff_flow',     theme: 'music', shaderType: 'flowing',    shape: 'streak',  palette: [[255,215,0],[200,160,60],[255,255,255]] },
    { id: 'keynote_glow',   theme: 'music', shaderType: 'snowfall',   shape: 'glow',    palette: [[255,255,255],[255,215,0],[255,240,200]] },
    // ===== 海 (sea) =====
    { id: 'wave_swell',     theme: 'sea', shaderType: 'flowing',   shape: 'streak',  palette: [[0,105,148],[0,180,216],[144,224,239]] },
    { id: 'bubble_rise',    theme: 'sea', shaderType: 'snowfall',  shape: 'spark',   palette: [[173,232,244],[255,255,255],[100,200,230]] },
    { id: 'coral_bloom',    theme: 'sea', shaderType: 'accumulate',shape: 'glow',    palette: [[255,127,111],[0,150,150],[255,180,160]] },
    { id: 'tide_pull',      theme: 'sea', shaderType: 'flowing',   shape: 'scatter', palette: [[2,62,138],[0,100,150],[50,140,190]] },
    { id: 'whirlpool',      theme: 'sea', shaderType: 'ripple',    shape: 'ring',    palette: [[0,150,170],[0,80,120],[150,220,230]] },
    { id: 'foam_crest',     theme: 'sea', shaderType: 'sparkle',   shape: 'spark',   palette: [[255,255,255],[220,240,250],[180,220,235]] },
    { id: 'deep_current',   theme: 'sea', shaderType: 'accumulate',shape: 'streak',  palette: [[5,30,70],[10,60,110],[40,100,150]] },
    { id: 'jellyfish_glow', theme: 'sea', shaderType: 'sparkle',   shape: 'glow',    palette: [[150,240,255],[255,150,220],[200,255,255]] },

    { id: 'skyline_glow',     theme: 'city', shaderType: 'flowing',    shape: 'glow',    palette: [[255,180,80],[80,120,200],[255,220,150]] },
    { id: 'subway_rush',      theme: 'city', shaderType: 'flowing',    shape: 'streak',  palette: [[255,255,255],[255,220,100],[200,200,255]] },
    { id: 'crosswalk_blink',  theme: 'city', shaderType: 'sparkle',    shape: 'spark',   palette: [[255,255,255],[255,255,200]] },
    { id: 'billboard_flicker',theme: 'city', shaderType: 'sparkle',    shape: 'scatter', palette: [[255,0,150],[0,255,255],[255,220,0],[150,0,255]] },
    { id: 'streetlamp_halo',  theme: 'city', shaderType: 'accumulate', shape: 'ring',    palette: [[255,200,120],[255,160,60]] },
    { id: 'taxi_light',       theme: 'city', shaderType: 'sparkle',    shape: 'glow',    palette: [[255,220,0],[255,180,0]] },
    { id: 'night_market',     theme: 'city', shaderType: 'accumulate', shape: 'scatter', palette: [[255,150,80],[255,80,80],[255,220,120],[200,80,255]] },
  ];

  function createShaderProgram(gl, vsSource, fsSource) {
    const vShader = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vShader, vsSource); gl.compileShader(vShader);
    const fShader = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fShader, fsSource); gl.compileShader(fShader);
    if (!gl.getShaderParameter(fShader, gl.COMPILE_STATUS)) {
      console.error("FS Error:", gl.getShaderInfoLog(fShader));
    }
    const prog = gl.createProgram();
    gl.attachShader(prog, vShader); gl.attachShader(prog, fShader);
    gl.linkProgram(prog);
    return prog;
  }

  function initBackgroundEffect(canvas) {
    const SIZE = 512;
    const mode = MODE_DEFINITIONS[Math.floor(Math.random() * MODE_DEFINITIONS.length)];
    console.log(`🎨 Share Player Effect: [${mode.theme}] ${mode.id}`);

    const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });
    canvas.width = canvas.height = SIZE;
    gl.viewport(0, 0, SIZE, SIZE);

    const vs = `attribute vec2 p; void main(){ gl_Position = vec4(p, 0.0, 1.0); }`;
    const prog = createShaderProgram(gl, vs, BASE_SHADERS[mode.shaderType]);
    gl.useProgram(prog);

    const uColorTintLoc = gl.getUniformLocation(prog, "u_colorTint");
    const uSnowLevelLoc = gl.getUniformLocation(prog, "u_snowLevel");
    if (uColorTintLoc) gl.uniform3f(uColorTintLoc, 1.0, 1.0, 1.0);
    if (uSnowLevelLoc) gl.uniform1f(uSnowLevelLoc, 0.3);

    const posLoc = gl.getAttribLocation(prog, "p");
    const quadVbo = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, quadVbo);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, SIZE, SIZE, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array(SIZE * SIZE * 4));
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

    function trigger(velocity) {
      gl.bindTexture(gl.TEXTURE_2D, tex);
      const { x, y, size, data } = generateSplat(mode.shape, mode.palette, velocity);
      gl.texSubImage2D(gl.TEXTURE_2D, 0, x, y, size, size, gl.RGBA, gl.UNSIGNED_BYTE, data);
    }

    function render() {
      gl.useProgram(prog);
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      gl.copyTexImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 0, 0, SIZE, SIZE, 0);
      gl.flush();
      requestAnimationFrame(render);
    }
    render();

    return { trigger };
  }

  // ★ 演奏中、ノートが「鳴った瞬間」を検知してエフェクトを発火させる
  function driveEffectWithPlayback(effect, events, ctxAudio, refTime) {
    const onEvents = events.filter(ev => ev.type === 'on').sort((a, b) => a.time - b.time);
    let idx = 0;
    function loop() {
      const elapsed = ctxAudio.currentTime - refTime;
      while (idx < onEvents.length && onEvents[idx].time <= elapsed) {
        effect.trigger(onEvents[idx].velocity);
        idx++;
      }
      if (idx < onEvents.length) requestAnimationFrame(loop);
    }
    loop();
  }

  const btn = document.createElement('button');
  btn.id = 'playBtn';
  btn.textContent = '▶';
  playArea.appendChild(btn);

  let started = false;
  btn.addEventListener('click', async () => {
    if (started) return;
    started = true;
    btn.disabled = true;
    btn.style.opacity = '0.5';
    statusEl.textContent = '読み込み中…';
    try {
      const events = await decodeToEvents();
      if (events.length === 0) {
        statusEl.textContent = '演奏データが空でした';
        return;
      }
      const Ctx = window.AudioContext || window.webkitAudioContext;
      const ctx = new Ctx();
      await preloadNeededSounds(ctx, events);
      statusEl.textContent = '再生中…';
      btn.textContent = 'Ⅱ';
      btn.style.opacity = '1';
      const refTime = playEvents(ctx, events);

      const bgCanvas = document.getElementById('bgCanvas');
      const effect = initBackgroundEffect(bgCanvas);
      driveEffectWithPlayback(effect, events, ctx, refTime);
    } catch (err) {
      console.error(err);
      statusEl.textContent = '';
      playArea.innerHTML = '<div class="error">再生に失敗しました。<br>' + (err.message || '') + '</div>';
    }
  });
})();
</script>
